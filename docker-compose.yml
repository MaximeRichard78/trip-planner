# docker-compose.yml
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: trip-planner:dev
    container_name: trip-planner-app
    ports:
      - "8080:80"
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s